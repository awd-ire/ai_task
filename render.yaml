services:
  - type: web
    name: ai-task-manager
    runtime: node
    plan: free
    region: oregon

    buildCommand: |
      cd frontend
      npm install
      npm run build

      cd ../backend
      npm install

      mkdir -p public
      cp -r ../frontend/dist/*/*/* public/

    startCommand: |
      cd backend
      npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: "10000"

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 7d

      - key: DB_PATH
        value: ./data/ai-task-manager.sqlite